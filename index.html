<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <titlehttps://givekonami.github.io/gifts/></title>

  <style>
    /* 背景と中央寄せ */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: linear-gradient(to bottom, #ccffcc, #ffccdd);
      font-size: 22px; /* 基本文字サイズ */
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    /* タイトル文字 */
    h1 {
      font-size: 36px;
      margin-bottom: 30px;
    }

    /* ボタンのスタイル */
    .yt-button {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 30px;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: #ff4b4b;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 6px 0 #cc0000;
      transition: 0.1s;
    }

    .yt-button:active {
      box-shadow: none;
      transform: translateY(6px);
    }

    /* スマホ対応 */
    @media (max-width: 600px) {
      body {
        font-size: 22px;
        padding: 20px;
      }

      h1 {
        font-size: 32px;
      }

      .yt-button {
        font-size: 20px;
        padding: 12px 25px;
      }
    }
  </style>
</head>

<body>

  <h1>おかず.com</h1>

</body>
</html>
